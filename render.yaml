services:
  - type: web
    name: wacky-chess-variants
    runtime: node
    plan: free
    buildCommand: npm install --workspaces=false && npm --prefix client install && npm --prefix client run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUBLIC_SITE_URL
        sync: false
      - key: CLIENT_ORIGINS
        sync: false
      - key: VITE_PUBLIC_SITE_URL
        sync: false
      - key: VITE_SOCKET_URL
        sync: false
      - key: VITE_STRIPE_SUPPORT_URL
        sync: false
      - key: SUPPORT_UI_ENABLED
        value: "true"
